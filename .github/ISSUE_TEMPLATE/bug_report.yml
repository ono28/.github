name: バグ報告
description: 不具合の報告はこちら
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。
        できるだけ再現しやすい情報を記載してください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな不具合かを簡潔に書いてください
      placeholder: 例）ログインボタンを押しても画面が遷移しない
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 1つずつ順番に書いてください
      placeholder: |
        1. 〇〇ページを開く
        2. △△をクリックする
        3. エラーが発生する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どうなってほしいか
      placeholder: 例）ダッシュボードに遷移してほしい
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に起きたこと
      placeholder: 例）何も起きない / 500エラーが出る
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 環境
      description: OS / ブラウザ / アプリバージョンなど
      placeholder: 例）macOS 15 / Chrome 135 / app v2.3.1
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 補足情報
      description: エラーログ、スクリーンショット、URL など
      placeholder: 例）コンソールログ、画面キャプチャ、発生URL
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue を確認しました
          required: true
        - label: 再現手順を確認しました
          required: true
